name: Deploy Docs to Hostinger

# Se dispara SOLO al publicar un Release (tag). Así la web refleja siempre la
# última versión publicada del paquete, nunca el estado intermedio de main.
on:
  release:
    types: [published]
  # Permite re-deployar manualmente desde la pestaña Actions (fallback).
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # checkout del tag de la release (github.ref apunta al tag publicado).
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      # 1. Buildear la librería: docs la consume vía file:.. (su dist/).
      - run: pnpm install
      - run: pnpm run build

      # 2. Buildear la docs contra esa versión (prebuild valida sincronía y
      #    genera props/código/prosa; falla si algo está incompleto).
      - name: Build docs
        working-directory: docs
        env:
          DOCS_BASE: ${{ vars.DOCS_BASE || '/' }}
        run: |
          npm install
          npm run build

      # 3. Subir docs/dist al servidor Hostinger por SSH (rsync sobre SSH).
      #    Secrets requeridos (Settings → Secrets and variables → Actions):
      #      SSH_HOST         host del servidor (IP o hostname)
      #      SSH_USER         usuario SSH
      #      SSH_PRIVATE_KEY  clave privada SSH (contenido completo del archivo)
      #    Variables:
      #      SSH_PORT         puerto SSH (opcional, default 22)
      #      SSH_TARGET       carpeta destino en el server (p. ej. /home/user/htdocs/docs)
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ vars.SSH_PORT || 22 }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ vars.SSH_PORT || 22 }}" \
            docs/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.SSH_TARGET }}/"
